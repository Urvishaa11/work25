{% extends 'base.html' %}
{% block title %}Work24 | {{ _('admin_login') }}{% endblock %}
{% block content %}
<section class="mx-auto flex max-w-xl flex-col items-center px-4 py-24 sm:px-6 lg:px-8">
    <div class="card w-full text-center">
        <div class="eyebrow">{{ _('admin_login') }}</div>
        <h1 class="mt-3 text-3xl font-black">{{ _('admin_panel') }}</h1>
        <p class="mt-4 text-sm leading-7 text-slate-600">{{ _('admin_login_desc') }}</p>
        
        <form method="post" class="mt-8 grid gap-4 text-left">
            <div>
                <label class="form-label">{{ _('admin_id') }}</label>
                <input class="form-input" type="text" name="admin_id" required>
            </div>
            <div>
                <label class="form-label">{{ _('password_label') }}</label>
                <input class="form-input" type="password" name="password" required>
            </div>
            <button class="mt-4 rounded-full bg-work24-ink px-6 py-4 text-sm font-bold text-white transition hover:bg-work24-orange" type="submit">{{ _('login') }}</button>
        </form>
    </div>
</section>
{% endblock %}
